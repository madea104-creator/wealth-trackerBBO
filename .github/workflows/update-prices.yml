name: Update Stock Prices

on:
  schedule:
    - cron: '30 6 * * 1-5'
    - cron: '0 1 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch all market prices
        run: |
          python3 << 'EOF'
          import urllib.request
          import json
          import csv
          import time
          import datetime
          import io

          result = {}

          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0',
              'Accept': 'text/html,application/json,text/plain,*/*',
              'Accept-Language': 'zh-TW,zh;q=0.9,en;q=0.8',
          }

          def fetch(url, timeout=20):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=timeout) as r:
                  raw = r.read()
                  for enc in ['utf-8-sig', 'utf-8', 'big5', 'cp950']:
                      try:
                          return raw.decode(enc, errors='strict')
                      except:
                          continue
                  return raw.decode('utf-8', errors='ignore')

          now_tw   = datetime.datetime.utcnow() + datetime.timedelta(hours=8)
          roc_year = now_tw.year - 1911
          roc_date = f"{roc_year}/{now_tw.month:02d}/{now_tw.day:02d}"
          today    = now_tw.strftime('%Y%m%d')
          print(f"台灣時間: {now_tw.strftime('%Y-%m-%d %H:%M')}")

          # ── 1. 上市股票（TWSE）───────────────────────────────────
          print("\n[1] 上市股票（TWSE）...")
          try:
              url = 'https://www.twse.com.tw/exchangeReport/STOCK_DAY_ALL?response=open_data'
              content = fetch(url)
              reader = csv.reader(io.StringIO(content))
              count = 0
              for i, row in enumerate(reader):
                  if i == 0: continue
                  if len(row) < 9: continue
                  ticker = row[0].strip()
                  close  = row[8].strip().replace(',', '')
                  if not ticker or not close or close in ('--', '-', ''): continue
                  try:
                      price = float(close)
                      if price > 0:
                          result[ticker] = {'price': price, 'ccy': 'TWD', 'src': 'twse'}
                          count += 1
                  except: pass
              print(f"  OK: {count} 筆")
          except Exception as e:
              print(f"  FAIL: {e}")
          time.sleep(2)

          # ── 2. 上櫃股票（TPEx）───────────────────────────────────
          print(f"\n[2] 上櫃股票（TPEx）...")
          tpex_ok = False
          try:
              url = f'https://www.tpex.org.tw/web/stock/aftertrading/daily_close_quotes/stk_quote_result.php?l=zh-tw&d={roc_date}&_={int(time.time())}'
              content = fetch(url)
              data = json.loads(content)
              rows = data.get('aaData', [])
              count = 0
              for row in rows:
                  if len(row) < 3: continue
                  ticker = str(row[0]).strip()
                  close  = str(row[2]).strip().replace(',', '')
                  if not ticker or not close or close in ('--', '-', ''): continue
                  try:
                      price = float(close)
                      if price > 0 and ticker not in result:
                          result[ticker] = {'price': price, 'ccy': 'TWD', 'src': 'tpex'}
                          count += 1
                  except: pass
              tpex_ok = count > 0
              print(f"  OK (JSON): {count} 筆")
          except Exception as e:
              print(f"  FAIL (JSON): {e}")

          if not tpex_ok:
              try:
                  url = f'https://www.tpex.org.tw/openapi/v1/tpex_mainboard_daily_close_quotes?date={today}'
                  content = fetch(url)
                  rows = json.loads(content)
                  count = 0
                  for row in rows:
                      ticker = str(row.get('SecuritiesCompanyCode', '')).strip()
                      close  = str(row.get('Close', '')).strip().replace(',', '')
                      if not ticker or not close or close in ('--', '-', ''): continue
                      try:
                          price = float(close)
                          if price > 0 and ticker not in result:
                              result[ticker] = {'price': price, 'ccy': 'TWD', 'src': 'tpex'}
                              count += 1
                      except: pass
                  print(f"  OK (OpenAPI): {count} 筆")
              except Exception as e:
                  print(f"  FAIL (OpenAPI): {e}")
          time.sleep(2)

          # ── 3. 可轉換公司債（CB）全市場掃描 ─────────────────────
          # CB 代號規則：母股代號(4碼) + 發行次數(1碼，1-9 A-Z)
          # 用 getStockInfo 批次查，一次30支，自動掃出所有在市 CB
          print("\n[3] 可轉換公司債（CB）全市場掃描...")

          # 先取得所有上市+上櫃股票代號作為母股清單
          all_parent_codes = set()
          try:
              # 上市母股代號
              url = 'https://openapi.twse.com.tw/v1/opendata/t187ap03_L'
              content = fetch(url)
              items = json.loads(content)
              for x in items:
                  code = str(x.get('公司代號', '')).strip()
                  if code and len(code) == 4:
                      all_parent_codes.add(code)
              print(f"  上市母股: {len(all_parent_codes)} 筆")
          except Exception as e:
              print(f"  上市母股 FAIL: {e}")

          try:
              # 上櫃母股代號
              url = 'https://www.tpex.org.tw/openapi/v1/tpex_listed_companies'
              content = fetch(url)
              items = json.loads(content)
              for x in items:
                  code = str(x.get('SecuritiesCompanyCode', x.get('公司代號', ''))).strip()
                  if code and len(code) in [4, 5]:
                      all_parent_codes.add(code[:4])
              print(f"  加入上櫃母股後: {len(all_parent_codes)} 筆")
          except Exception as e:
              print(f"  上櫃母股 FAIL: {e}")

          # 產生所有可能的 CB 代號：母股代號 + 1~9 + A~F
          suffixes = [str(i) for i in range(1, 10)] + ['A', 'B', 'C', 'D', 'E', 'F']
          cb_candidates = []
          for code in sorted(all_parent_codes):
              for s in suffixes:
                  cb_candidates.append(code + s)

          print(f"  CB候選代號: {len(cb_candidates)} 個，開始批次查詢...")

          # 批次查詢，每批30個，同時試 otc_ 和 tse_
          cb_count = 0
          batch_size = 30

          for ex in ['otc', 'tse']:
              for i in range(0, len(cb_candidates), batch_size):
                  batch = cb_candidates[i:i+batch_size]
                  ex_ch = '|'.join(f'{ex}_{c}.tw' for c in batch)
                  try:
                      url = f'https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch={ex_ch}&json=1&delay=0'
                      content = fetch(url, timeout=15)
                      data = json.loads(content)
                      for item in data.get('msgArray', []):
                          ticker = str(item.get('c', '')).strip()
                          if not ticker: continue
                          # 確認是CB（代號5碼且最後一碼是數字或字母）
                          if len(ticker) != 5: continue
                          z = str(item.get('z', '-')).strip()
                          y = str(item.get('y', '-')).strip()
                          close = z if z not in ('-', '') else y
                          if not close or close in ('-', ''): continue
                          try:
                              price = float(close)
                              if price > 0 and ticker not in result:
                                  result[ticker] = {'price': price, 'ccy': 'TWD', 'src': f'{ex}_cb'}
                                  cb_count += 1
                          except: pass
                  except: pass
                  time.sleep(0.2)

          # 也從 tickers.json 補充手動指定的 CB
          try:
              with open('tickers.json', 'r') as f:
                  tickers_cfg = json.load(f)
              manual_cb = tickers_cfg.get('cb', [])
              for ticker in manual_cb:
                  if ticker in result: continue
                  for ex in ['otc', 'tse']:
                      try:
                          url = f'https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch={ex}_{ticker}.tw&json=1&delay=0'
                          content = fetch(url, timeout=10)
                          data = json.loads(content)
                          items = data.get('msgArray', [])
                          if not items: continue
                          item = items[0]
                          z = str(item.get('z', '-')).strip()
                          y = str(item.get('y', '-')).strip()
                          close = z if z not in ('-', '') else y
                          if not close or close in ('-', ''): continue
                          price = float(close)
                          if price > 0:
                              result[ticker] = {'price': price, 'ccy': 'TWD', 'src': f'{ex}_cb'}
                              cb_count += 1
                              print(f"  ✓ 手動CB {ticker}: {price}")
                              break
                      except: pass
          except: pass

          print(f"  CB 合計: {cb_count} 筆")
          time.sleep(1)

          # ── 4. 加密貨幣（CoinGecko Top 100）────────────────────────
          print("\n[4] 加密貨幣...")
          try:
              url = 'https://api.coingecko.com/api/v3/coins/markets?vs_currency=twd&order=market_cap_desc&per_page=100&page=1'
              content = fetch(url, timeout=25)
              coins = json.loads(content)
              count = 0
              for coin in coins:
                  cid   = coin.get('id', '')
                  price = coin.get('current_price')
                  sym   = coin.get('symbol', '')
                  if cid and price and price > 0:
                      result[cid.lower()] = {'price': price, 'ccy': 'TWD', 'src': 'coingecko', 'sym': sym}
                      count += 1
              print(f"  OK: {count} 筆")
          except Exception as e:
              print(f"  FAIL: {e}")

          # ── 5. 寫入 prices.json ──────────────────────────────────
          now_utc = datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
          output = {'updated': now_utc, 'count': len(result), 'prices': result}
          with open('prices.json', 'w', encoding='utf-8') as f:
              json.dump(output, f, ensure_ascii=False)
          print(f"\nDONE: prices.json 共 {len(result)} 筆，{now_utc}")
          EOF

      - name: Commit prices.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --staged --quiet || git commit -m "chore: update prices $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
