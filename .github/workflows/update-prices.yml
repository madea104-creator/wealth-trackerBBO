name: Update Stock Prices

on:
  schedule:
    - cron: '30 6 * * 1-5'
    - cron: '0 1 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch all market prices
        run: |
          python3 << 'EOF'
          import urllib.request
          import json
          import csv
          import time
          import datetime
          import io

          result = {}

          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0',
              'Accept': 'text/html,application/json,text/plain,*/*',
              'Accept-Language': 'zh-TW,zh;q=0.9,en;q=0.8',
          }

          def fetch(url, timeout=20):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=timeout) as r:
                  raw = r.read()
                  for enc in ['utf-8-sig', 'utf-8', 'big5', 'cp950']:
                      try:
                          return raw.decode(enc, errors='strict')
                      except:
                          continue
                  return raw.decode('utf-8', errors='ignore')

          now_tw  = datetime.datetime.utcnow() + datetime.timedelta(hours=8)
          roc_year = now_tw.year - 1911
          roc_date = f"{roc_year}/{now_tw.month:02d}/{now_tw.day:02d}"
          today   = now_tw.strftime('%Y%m%d')
          print(f"台灣時間: {now_tw.strftime('%Y-%m-%d %H:%M')}，民國: {roc_date}")

          # ── 1. 台灣上市股票（TWSE）───────────────────────────────
          print("\n[1] 上市股票（TWSE）...")
          try:
              url = 'https://www.twse.com.tw/exchangeReport/STOCK_DAY_ALL?response=open_data'
              content = fetch(url)
              reader = csv.reader(io.StringIO(content))
              count = 0
              for i, row in enumerate(reader):
                  if i == 0: continue
                  if len(row) < 9: continue
                  ticker = row[0].strip()
                  close  = row[8].strip().replace(',', '')
                  if not ticker or not close or close in ('--', '-', ''): continue
                  try:
                      price = float(close)
                      if price > 0:
                          result[ticker] = {'price': price, 'ccy': 'TWD', 'src': 'twse'}
                          count += 1
                  except: pass
              print(f"  OK: {count} 筆")
          except Exception as e:
              print(f"  FAIL: {e}")
          time.sleep(2)

          # ── 2. 台灣上櫃股票（TPEx）───────────────────────────────
          print(f"\n[2] 上櫃股票（TPEx）...")
          tpex_ok = False
          try:
              url = f'https://www.tpex.org.tw/web/stock/aftertrading/daily_close_quotes/stk_quote_result.php?l=zh-tw&d={roc_date}&_={int(time.time())}'
              content = fetch(url)
              data = json.loads(content)
              rows = data.get('aaData', [])
              count = 0
              for row in rows:
                  if len(row) < 3: continue
                  ticker = str(row[0]).strip()
                  close  = str(row[2]).strip().replace(',', '')
                  if not ticker or not close or close in ('--', '-', ''): continue
                  try:
                      price = float(close)
                      if price > 0 and ticker not in result:
                          result[ticker] = {'price': price, 'ccy': 'TWD', 'src': 'tpex'}
                          count += 1
                  except: pass
              tpex_ok = count > 0
              print(f"  OK (JSON): {count} 筆")
          except Exception as e:
              print(f"  FAIL (JSON): {e}")

          if not tpex_ok:
              try:
                  url = f'https://www.tpex.org.tw/openapi/v1/tpex_mainboard_daily_close_quotes?date={today}'
                  content = fetch(url)
                  rows = json.loads(content)
                  count = 0
                  for row in rows:
                      ticker = str(row.get('SecuritiesCompanyCode', '')).strip()
                      close  = str(row.get('Close', '')).strip().replace(',', '')
                      if not ticker or not close or close in ('--', '-', ''): continue
                      try:
                          price = float(close)
                          if price > 0 and ticker not in result:
                              result[ticker] = {'price': price, 'ccy': 'TWD', 'src': 'tpex'}
                              count += 1
                      except: pass
                  print(f"  OK (OpenAPI): {count} 筆")
              except Exception as e:
                  print(f"  FAIL (OpenAPI): {e}")
          time.sleep(2)

          # ── 3. 可轉換公司債（CB）─────────────────────────────────
          # 用 TWSE MI_INDEX?type=CB 取得上市CB代號清單，再用 getStockInfo 批次查報價
          print("\n[3] 可轉換公司債（CB）...")
          cb_tickers_tse = []
          cb_tickers_otc = []

          # 取得上市CB代號
          try:
              url = f'https://www.twse.com.tw/exchangeReport/MI_INDEX?response=json&date={today}&type=CB'
              content = fetch(url)
              data = json.loads(content)
              # MI_INDEX 回傳多個 table，找含 CB 的那個
              for table in data.get('tables', []):
                  cols = table.get('fields', [])
                  rows = table.get('data', [])
                  if not rows: continue
                  # 找「證券代號」欄位位置
                  try:
                      idx = next(i for i, c in enumerate(cols) if '代號' in str(c) or 'Code' in str(c))
                      close_idx = next(i for i, c in enumerate(cols) if '收盤' in str(c) or 'Close' in str(c))
                  except StopIteration:
                      continue
                  for row in rows:
                      if len(row) <= max(idx, close_idx): continue
                      ticker = str(row[idx]).strip()
                      close  = str(row[close_idx]).strip().replace(',', '')
                      if not ticker or not close or close in ('--', '-', ''): continue
                      try:
                          price = float(close)
                          if price > 0:
                              result[ticker] = {'price': price, 'ccy': 'TWD', 'src': 'twse_cb'}
                              cb_tickers_tse.append(ticker)
                      except: pass
              print(f"  上市CB (MI_INDEX): {len(cb_tickers_tse)} 筆")
          except Exception as e:
              print(f"  上市CB MI_INDEX FAIL: {e}")

          # 備用：用 getStockInfo 即時查（支援CB代號，格式 tse_15601.tw）
          # 先從公開清單取得所有CB代號
          if len(cb_tickers_tse) == 0:
              try:
                  url = 'https://openapi.twse.com.tw/v1/opendata/t187ap03_L'
                  content = fetch(url)
                  items = json.loads(content)
                  cb_codes = [str(x.get('公司代號','')).strip() for x in items
                              if '轉換公司債' in str(x.get('有價證券別','')) or
                                 '可轉換' in str(x.get('有價證券別',''))]
                  print(f"  找到 {len(cb_codes)} 個上市CB代號，批次查報價...")
                  # 每次最多30個一批
                  batch_size = 30
                  cb_count = 0
                  for i in range(0, len(cb_codes), batch_size):
                      batch = cb_codes[i:i+batch_size]
                      ex_ch = '|'.join(f'tse_{c}.tw' for c in batch)
                      try:
                          url2 = f'https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch={ex_ch}&json=1&delay=0'
                          content2 = fetch(url2, timeout=15)
                          data2 = json.loads(content2)
                          for item in data2.get('msgArray', []):
                              ticker = str(item.get('c', '')).strip()
                              z = str(item.get('z', '-')).strip()
                              y = str(item.get('y', '-')).strip()
                              close = z if z != '-' else y
                              if not close or close == '-': continue
                              try:
                                  price = float(close)
                                  if price > 0:
                                      result[ticker] = {'price': price, 'ccy': 'TWD', 'src': 'twse_cb'}
                                      cb_count += 1
                              except: pass
                      except Exception as e2:
                          print(f"    batch {i} FAIL: {e2}")
                      time.sleep(0.5)
                  print(f"  上市CB (getStockInfo): {cb_count} 筆")
              except Exception as e:
                  print(f"  上市CB 備用 FAIL: {e}")

          # 上櫃CB：TPEx openapi
          try:
              url = f'https://www.tpex.org.tw/openapi/v1/tpex_cb_daily_close_quotes?date={today}'
              content = fetch(url)
              rows = json.loads(content)
              count = 0
              for row in rows:
                  ticker = str(row.get('SecuritiesCompanyCode', row.get('代號', ''))).strip()
                  close  = str(row.get('Close', row.get('收盤', ''))).strip().replace(',', '')
                  if not ticker or not close or close in ('--', '-', ''): continue
                  try:
                      price = float(close)
                      if price > 0 and ticker not in result:
                          result[ticker] = {'price': price, 'ccy': 'TWD', 'src': 'tpex_cb'}
                          count += 1
                  except: pass
              print(f"  上櫃CB (TPEx OpenAPI): {count} 筆")
          except Exception as e:
              print(f"  上櫃CB FAIL: {e}")

          # 上櫃CB備用：用 getStockInfo otc_XXXXX.tw
          try:
              url = 'https://www.tpex.org.tw/openapi/v1/tpex_cb_list'
              content = fetch(url)
              items = json.loads(content)
              otc_cb_codes = [str(x.get('SecuritiesCompanyCode', x.get('代號', ''))).strip() for x in items]
              otc_cb_codes = [c for c in otc_cb_codes if c]
              print(f"  上櫃CB清單: {len(otc_cb_codes)} 個，批次查報價...")
              batch_size = 30
              cb_count = 0
              for i in range(0, len(otc_cb_codes), batch_size):
                  batch = otc_cb_codes[i:i+batch_size]
                  ex_ch = '|'.join(f'otc_{c}.tw' for c in batch)
                  try:
                      url2 = f'https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch={ex_ch}&json=1&delay=0'
                      content2 = fetch(url2, timeout=15)
                      data2 = json.loads(content2)
                      for item in data2.get('msgArray', []):
                          ticker = str(item.get('c', '')).strip()
                          z = str(item.get('z', '-')).strip()
                          y = str(item.get('y', '-')).strip()
                          close = z if z != '-' else y
                          if not close or close == '-': continue
                          try:
                              price = float(close)
                              if price > 0 and ticker not in result:
                                  result[ticker] = {'price': price, 'ccy': 'TWD', 'src': 'tpex_cb'}
                                  cb_count += 1
                          except: pass
                  except Exception as e2:
                      print(f"    otc batch {i} FAIL: {e2}")
                  time.sleep(0.5)
              print(f"  上櫃CB (getStockInfo): {cb_count} 筆")
          except Exception as e:
              print(f"  上櫃CB備用 FAIL: {e}")

          time.sleep(1)

          # ── 4. 加密貨幣（CoinGecko Top 100）────────────────────────
          print("\n[4] 加密貨幣...")
          try:
              url = 'https://api.coingecko.com/api/v3/coins/markets?vs_currency=twd&order=market_cap_desc&per_page=100&page=1'
              content = fetch(url, timeout=25)
              coins = json.loads(content)
              count = 0
              for coin in coins:
                  cid   = coin.get('id', '')
                  price = coin.get('current_price')
                  sym   = coin.get('symbol', '')
                  if cid and price and price > 0:
                      result[cid.lower()] = {'price': price, 'ccy': 'TWD', 'src': 'coingecko', 'sym': sym}
                      count += 1
              print(f"  OK: {count} 筆")
          except Exception as e:
              print(f"  FAIL: {e}")

          # ── 5. 寫入 prices.json ──────────────────────────────────
          now_utc = datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
          output = {'updated': now_utc, 'count': len(result), 'prices': result}
          with open('prices.json', 'w', encoding='utf-8') as f:
              json.dump(output, f, ensure_ascii=False)
          print(f"\nDONE: prices.json 共 {len(result)} 筆，{now_utc}")
          EOF

      - name: Commit prices.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --staged --quiet || git commit -m "chore: update prices $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
