name: Update Stock Prices

on:
  schedule:
    - cron: '30 6 * * 1-5'    # 台灣時間 14:30（週一到週五，收盤後）
    - cron: '0 1 * * 1-5'     # 台灣時間 09:00（開盤前）
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch all market prices
        run: |
          python3 << 'EOF'
          import urllib.request
          import urllib.error
          import json
          import csv
          import time
          import datetime
          import io

          result = {}

          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0',
              'Accept': 'text/html,application/json,text/plain,*/*',
              'Accept-Language': 'zh-TW,zh;q=0.9,en;q=0.8',
              'Referer': 'https://www.tpex.org.tw/',
          }

          def fetch(url, timeout=20):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=timeout) as r:
                  raw = r.read()
                  # 嘗試 utf-8-sig，失敗改 big5
                  for enc in ['utf-8-sig', 'utf-8', 'big5', 'cp950']:
                      try:
                          return raw.decode(enc, errors='strict')
                      except:
                          continue
                  return raw.decode('utf-8', errors='ignore')

          # 今天台灣時間（UTC+8）
          now_tw = datetime.datetime.utcnow() + datetime.timedelta(hours=8)
          # 民國年
          roc_year = now_tw.year - 1911
          roc_date = f"{roc_year}/{now_tw.month:02d}/{now_tw.day:02d}"
          print(f"台灣時間: {now_tw.strftime('%Y-%m-%d %H:%M')}，民國日期: {roc_date}")

          # ── 1. 台灣上市股票（TWSE，含 ETF）──────────────────────────
          print("\n[1] 上市股票（TWSE）...")
          try:
              url = 'https://www.twse.com.tw/exchangeReport/STOCK_DAY_ALL?response=open_data'
              content = fetch(url)
              reader = csv.reader(io.StringIO(content))
              count = 0
              for i, row in enumerate(reader):
                  if i == 0:
                      continue
                  if len(row) < 9:
                      continue
                  ticker = row[0].strip()
                  close  = row[8].strip().replace(',', '')
                  if not ticker or not close or close in ('--', '-', ''):
                      continue
                  try:
                      price = float(close)
                      if price > 0:
                          result[ticker] = {'price': price, 'ccy': 'TWD', 'src': 'twse'}
                          count += 1
                  except:
                      pass
              print(f"  OK: {count} 筆")
          except Exception as e:
              print(f"  FAIL: {e}")

          time.sleep(2)

          # ── 2. 台灣上櫃股票（TPEx，含 ETF）──────────────────────────
          # 正確 URL 需帶民國日期，回傳 JSON (aaData 欄位)
          print(f"\n[2] 上櫃股票（TPEx）日期={roc_date}...")
          tpex_ok = False
          # 方法A：帶日期的 JSON endpoint
          try:
              url = f'https://www.tpex.org.tw/web/stock/aftertrading/daily_close_quotes/stk_quote_result.php?l=zh-tw&d={roc_date}&_={int(time.time())}'
              content = fetch(url)
              data = json.loads(content)
              rows = data.get('aaData', [])
              count = 0
              for row in rows:
                  if len(row) < 3:
                      continue
                  ticker = str(row[0]).strip()
                  close  = str(row[2]).strip().replace(',', '')
                  if not ticker or not close or close in ('--', '-', ''):
                      continue
                  try:
                      price = float(close)
                      if price > 0 and ticker not in result:
                          result[ticker] = {'price': price, 'ccy': 'TWD', 'src': 'tpex'}
                          count += 1
                  except:
                      pass
              print(f"  OK (JSON): {count} 筆")
              tpex_ok = count > 0
          except Exception as e:
              print(f"  FAIL (JSON): {e}")

          # 方法B：TPEx OpenAPI v1
          if not tpex_ok:
              try:
                  url = f'https://www.tpex.org.tw/openapi/v1/tpex_mainboard_daily_close_quotes?date={now_tw.strftime("%Y%m%d")}'
                  content = fetch(url)
                  rows = json.loads(content)
                  count = 0
                  for row in rows:
                      ticker = str(row.get('SecuritiesCompanyCode', '')).strip()
                      close  = str(row.get('Close', '')).strip().replace(',', '')
                      if not ticker or not close or close in ('--', '-', ''):
                          continue
                      try:
                          price = float(close)
                          if price > 0 and ticker not in result:
                              result[ticker] = {'price': price, 'ccy': 'TWD', 'src': 'tpex'}
                              count += 1
                      except:
                          pass
                  print(f"  OK (OpenAPI): {count} 筆")
                  tpex_ok = count > 0
              except Exception as e:
                  print(f"  FAIL (OpenAPI): {e}")

          time.sleep(2)

          # ── 3. 可轉換公司債（CB）─────────────────────────────────────
          print("\n[3] 可轉換公司債（CB）...")
          cb_count = 0

          # 上市CB：TWSE OpenAPI
          for cb_url in [
              'https://openapi.twse.com.tw/v1/exchangeReport/BWCV',
              f'https://www.twse.com.tw/rwd/zh/bond/BWCV?response=json&date={now_tw.strftime("%Y%m%d")}',
              f'https://www.twse.com.tw/exchangeReport/BWCV?response=json&date={now_tw.strftime("%Y%m%d")}',
          ]:
              try:
                  content = fetch(cb_url)
                  data = json.loads(content)
                  # openapi 格式直接是陣列
                  rows = data if isinstance(data, list) else data.get('data', [])
                  for row in rows:
                      if isinstance(row, dict):
                          ticker = str(row.get('公司代號', row.get('SecuritiesCompanyCode', ''))).strip()
                          close  = str(row.get('收盤價', row.get('Close', ''))).strip().replace(',', '')
                      else:
                          if len(row) < 5: continue
                          ticker = str(row[0]).strip()
                          close  = str(row[4]).strip().replace(',', '')
                      if not ticker or not close or close in ('-', '--', ''):
                          continue
                      try:
                          price = float(close)
                          if price > 0:
                              result[ticker] = {'price': price, 'ccy': 'TWD', 'src': 'twse_cb'}
                              cb_count += 1
                      except:
                          pass
                  if cb_count > 0:
                      print(f"  上市CB OK ({cb_url.split('/')[-1]}): {cb_count} 筆")
                      break
              except Exception as e:
                  print(f"  上市CB FAIL {cb_url.split('/')[-1]}: {e}")

          time.sleep(1)

          # 上櫃CB：TPEx OpenAPI
          for cb_url in [
              f'https://www.tpex.org.tw/openapi/v1/tpex_cb_daily_close_quotes?date={now_tw.strftime("%Y%m%d")}',
              f'https://www.tpex.org.tw/web/bond/search/daily/bd_daily_result.php?l=zh-tw&d={roc_date}&t=C&o=data',
          ]:
              try:
                  content = fetch(cb_url)
                  # 先試 JSON
                  try:
                      rows = json.loads(content)
                      if isinstance(rows, list):
                          prev = cb_count
                          for row in rows:
                              if isinstance(row, dict):
                                  ticker = str(row.get('SecuritiesCompanyCode', row.get('公司代號', ''))).strip()
                                  close  = str(row.get('Close', row.get('收盤價', ''))).strip().replace(',', '')
                              else:
                                  continue
                              if not ticker or not close or close in ('-','--',''):
                                  continue
                              try:
                                  price = float(close)
                                  if price > 0 and ticker not in result:
                                      result[ticker] = {'price': price, 'ccy': 'TWD', 'src': 'tpex_cb'}
                                      cb_count += 1
                              except:
                                  pass
                          added = cb_count - prev
                          if added > 0:
                              print(f"  上櫃CB OK (JSON): {added} 筆")
                              break
                  except:
                      # 試 CSV
                      reader = csv.reader(io.StringIO(content))
                      prev = cb_count
                      for i, row in enumerate(reader):
                          if i < 2: continue
                          if len(row) < 3: continue
                          ticker = row[0].strip()
                          close  = row[2].strip().replace(',', '')
                          if not close or close in ('-','--',''): continue
                          try:
                              price = float(close)
                              if price > 0 and ticker not in result:
                                  result[ticker] = {'price': price, 'ccy': 'TWD', 'src': 'tpex_cb'}
                                  cb_count += 1
                          except:
                              pass
                      added = cb_count - prev
                      if added > 0:
                          print(f"  上櫃CB OK (CSV): {added} 筆")
                          break
              except Exception as e:
                  print(f"  上櫃CB FAIL: {e}")

          print(f"  CB 合計: {cb_count} 筆")
          time.sleep(1)

          # ── 4. 加密貨幣（CoinGecko Top 100）────────────────────────
          print("\n[4] 加密貨幣（CoinGecko Top 100）...")
          try:
              url = 'https://api.coingecko.com/api/v3/coins/markets?vs_currency=twd&order=market_cap_desc&per_page=100&page=1'
              content = fetch(url, timeout=25)
              coins = json.loads(content)
              count = 0
              for coin in coins:
                  cid   = coin.get('id', '')
                  price = coin.get('current_price')
                  sym   = coin.get('symbol', '')
                  if cid and price and price > 0:
                      result[cid.lower()] = {'price': price, 'ccy': 'TWD', 'src': 'coingecko', 'sym': sym}
                      count += 1
              print(f"  OK: {count} 筆")
          except Exception as e:
              print(f"  FAIL: {e}")

          # ── 5. 寫入 prices.json ──────────────────────────────────
          now_utc = datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
          output = {
              'updated': now_utc,
              'count':   len(result),
              'prices':  result
          }
          with open('prices.json', 'w', encoding='utf-8') as f:
              json.dump(output, f, ensure_ascii=False)

          print(f"\nDONE: prices.json 共 {len(result)} 筆，{now_utc}")
          EOF

      - name: Commit prices.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --staged --quiet || git commit -m "chore: update prices $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
