name: Update Stock Prices

on:
  schedule:
    - cron: '30 6 * * 1-5'
    - cron: '0 1 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch all market prices
        run: |
          python3 << 'EOF'
          import urllib.request
          import json
          import csv
          import time
          import datetime
          import io

          result = {}

          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0',
              'Accept': 'text/html,application/json,text/plain,*/*',
              'Accept-Language': 'zh-TW,zh;q=0.9,en;q=0.8',
          }

          def fetch(url, timeout=60):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=timeout) as r:
                  # 分塊讀取，避免大檔案 IncompleteRead
                  chunks = []
                  while True:
                      chunk = r.read(65536)
                      if not chunk:
                          break
                      chunks.append(chunk)
                  raw = b''.join(chunks)
                  for enc in ['utf-8-sig', 'utf-8', 'big5', 'cp950']:
                      try:
                          return raw.decode(enc, errors='strict')
                      except:
                          continue
                  return raw.decode('utf-8', errors='ignore')

          def batch_getStockInfo(codes, exchange):
              """用 getStockInfo 批次查報價，每批30支"""
              prices = {}
              batch_size = 30
              for i in range(0, len(codes), batch_size):
                  batch = codes[i:i+batch_size]
                  ex_ch = '|'.join(f'{exchange}_{c}.tw' for c in batch)
                  try:
                      url = f'https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch={ex_ch}&json=1&delay=0'
                      content = fetch(url, timeout=15)
                      data = json.loads(content)
                      for item in data.get('msgArray', []):
                          ticker = str(item.get('c', '')).strip()
                          if not ticker: continue
                          z = str(item.get('z', '-')).strip()
                          y = str(item.get('y', '-')).strip()
                          close = z if z not in ('-', '') else y
                          if not close or close in ('-', ''): continue
                          try:
                              price = float(close)
                              if price > 0:
                                  prices[ticker] = price
                          except: pass
                  except: pass
                  time.sleep(0.3)
              return prices

          now_tw   = datetime.datetime.utcnow() + datetime.timedelta(hours=8)
          roc_year = now_tw.year - 1911
          roc_date = f"{roc_year}/{now_tw.month:02d}/{now_tw.day:02d}"
          today    = now_tw.strftime('%Y%m%d')
          print(f"台灣時間: {now_tw.strftime('%Y-%m-%d %H:%M')}")

          # ── 1. 上市股票（TWSE）───────────────────────────────────
          print("\n[1] 上市股票（TWSE）...")
          try:
              url = 'https://www.twse.com.tw/exchangeReport/STOCK_DAY_ALL?response=open_data'
              content = fetch(url)
              reader = csv.reader(io.StringIO(content))
              count = 0
              for i, row in enumerate(reader):
                  if i == 0: continue
                  if len(row) < 9: continue
                  ticker = row[0].strip()
                  close  = row[8].strip().replace(',', '')
                  if not ticker or not close or close in ('--', '-', ''): continue
                  try:
                      price = float(close)
                      if price > 0:
                          result[ticker] = {'price': price, 'ccy': 'TWD', 'src': 'twse'}
                          count += 1
                  except: pass
              print(f"  OK: {count} 筆")
          except Exception as e:
              print(f"  FAIL: {e}")
          time.sleep(1)

          # ── 1b. 上市ETF（TWSE ETF，STOCK_DAY_ALL 不含ETF需另外抓）───
          print("\n[1b] 上市ETF...")
          try:
              url = f'https://www.twse.com.tw/exchangeReport/MI_INDEX?response=json&date={today}&type=ETF'
              content_etf = fetch(url)
              data_etf = json.loads(content_etf)
              count = 0
              for table in data_etf.get('tables', []):
                  fields = table.get('fields', [])
                  rows   = table.get('data', [])
                  if not rows or not fields: continue
                  try:
                      code_idx  = next(i for i,f in enumerate(fields) if '代號' in str(f) or 'Code' in str(f))
                      close_idx = next(i for i,f in enumerate(fields) if '收盤' in str(f) or 'Close' in str(f))
                  except StopIteration:
                      continue
                  for row in rows:
                      if len(row) <= max(code_idx, close_idx): continue
                      ticker = str(row[code_idx]).strip()
                      close  = str(row[close_idx]).strip().replace(',','')
                      if not ticker or not close or close in ('--','-',''): continue
                      try:
                          price = float(close)
                          if price > 0 and ticker not in result:
                              result[ticker] = {'price': price, 'ccy': 'TWD', 'src': 'twse_etf'}
                              count += 1
                      except: pass
              print(f"  OK: {count} 筆")
          except Exception as e:
              print(f"  FAIL: {e}")
          time.sleep(1)

          # ── 2. 上櫃股票（TPEx）───────────────────────────────────
          print(f"\n[2] 上櫃股票（TPEx）...")
          tpex_ok = False
          try:
              url = f'https://www.tpex.org.tw/web/stock/aftertrading/daily_close_quotes/stk_quote_result.php?l=zh-tw&d={roc_date}&_={int(time.time())}'
              content = fetch(url)
              data = json.loads(content)
              rows = data.get('aaData', [])
              count = 0
              for row in rows:
                  if len(row) < 3: continue
                  ticker = str(row[0]).strip()
                  close  = str(row[2]).strip().replace(',', '')
                  if not ticker or not close or close in ('--', '-', ''): continue
                  try:
                      price = float(close)
                      if price > 0 and ticker not in result:
                          result[ticker] = {'price': price, 'ccy': 'TWD', 'src': 'tpex'}
                          count += 1
                  except: pass
              tpex_ok = count > 0
              print(f"  OK (JSON): {count} 筆")
          except Exception as e:
              print(f"  FAIL (JSON): {e}")

          if not tpex_ok:
              try:
                  url = f'https://www.tpex.org.tw/openapi/v1/tpex_mainboard_daily_close_quotes?date={today}'
                  content = fetch(url)
                  rows = json.loads(content)
                  count = 0
                  for row in rows:
                      ticker = str(row.get('SecuritiesCompanyCode', '')).strip()
                      close  = str(row.get('Close', '')).strip().replace(',', '')
                      if not ticker or not close or close in ('--', '-', ''): continue
                      try:
                          price = float(close)
                          if price > 0 and ticker not in result:
                              result[ticker] = {'price': price, 'ccy': 'TWD', 'src': 'tpex'}
                              count += 1
                      except: pass
                  print(f"  OK (OpenAPI): {count} 筆")
              except Exception as e:
                  print(f"  FAIL (OpenAPI): {e}")
          time.sleep(2)

          # ── 3. 可轉換公司債（CB）─────────────────────────────────
          # CB 已包含在上市/上櫃資料裡（5碼代號，末碼為數字或字母）
          # 這裡額外補充：從 tickers.json 手動指定的 CB，以及上市CB清單
          print("\n[3] 可轉換公司債（CB）補充...")
          cb_count = 0

          # 從上市有價證券清單找 CB（5碼代號含轉換公司債）
          try:
              url = 'https://openapi.twse.com.tw/v1/opendata/t187ap03_L'
              content_t = fetch(url)
              items = json.loads(content_t)
              cb_codes_tse = []
              for x in items:
                  typ  = str(x.get('有價證券別', '')).strip()
                  code = str(x.get('公司代號', '')).strip()
                  if ('轉換' in typ or 'CB' in typ.upper()) and len(code) == 5:
                      cb_codes_tse.append(code)
              print(f"  上市CB清單: {len(cb_codes_tse)} 支")
              if cb_codes_tse:
                  prices = batch_getStockInfo(cb_codes_tse, 'tse')
                  for ticker, price in prices.items():
                      if ticker not in result:
                          result[ticker] = {'price': price, 'ccy': 'TWD', 'src': 'tse_cb'}
                          cb_count += 1
          except Exception as e:
              print(f"  上市CB FAIL: {e}")

          # 從 tickers.json 手動指定的 CB（備援）
          try:
              with open('tickers.json', 'r') as f:
                  tickers_cfg = json.load(f)
              manual_cb = tickers_cfg.get('cb', [])
              if manual_cb:
                  print(f"  手動CB: {manual_cb}")
                  for ticker in manual_cb:
                      if ticker in result:
                          continue
                      for ex in ['otc', 'tse']:
                          try:
                              url = f'https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch={ex}_{ticker}.tw&json=1&delay=0'
                              content_m = fetch(url, timeout=10)
                              data = json.loads(content_m)
                              items = data.get('msgArray', [])
                              if not items: continue
                              item = items[0]
                              z = str(item.get('z', '-')).strip()
                              y = str(item.get('y', '-')).strip()
                              close = z if z not in ('-', '') else y
                              if not close or close in ('-', ''): continue
                              price = float(close)
                              if price > 0:
                                  result[ticker] = {'price': price, 'ccy': 'TWD', 'src': f'{ex}_cb'}
                                  cb_count += 1
                                  print(f"  ✓ {ticker} ({ex}): {price}")
                                  break
                          except: pass
          except: pass

          print(f"  CB 合計補充: {cb_count} 筆")
          time.sleep(1)

          # ── 3b. tickers.json 手動指定的個股/ETF ─────────────────
          # 用 getStockInfo 補查 tickers.json 裡 tw/two 清單（ETF、特殊個股）
          try:
              with open('tickers.json', 'r') as f:
                  tc = json.load(f)
              manual_tw  = [t for t in tc.get('tw',  []) if t not in result]
              manual_two = [t for t in tc.get('two', []) if t not in result]
              manual_us  = [t for t in tc.get('us',  []) if t not in result]

              if manual_tw:
                  prices = batch_getStockInfo(manual_tw, 'tse')
                  for ticker, price in prices.items():
                      result[ticker] = {'price': price, 'ccy': 'TWD', 'src': 'tse_manual'}
                  print(f"  手動上市: {len(prices)} 筆 ({manual_tw})")

              if manual_two:
                  prices = batch_getStockInfo(manual_two, 'otc')
                  for ticker, price in prices.items():
                      result[ticker] = {'price': price, 'ccy': 'TWD', 'src': 'otc_manual'}
                  print(f"  手動上櫃: {len(prices)} 筆")

              if manual_us:
                  for ticker in manual_us:
                      try:
                          url = f'https://query1.finance.yahoo.com/v8/finance/chart/{ticker}?interval=1d&range=1d'
                          c = fetch(url, timeout=10)
                          d = json.loads(c)
                          p = d['chart']['result'][0]['meta']['regularMarketPrice']
                          if p:
                              result[ticker] = {'price': p, 'ccy': 'USD', 'src': 'yahoo_manual'}
                      except: pass
                  print(f"  手動美股查詢完成")
          except Exception as e:
              print(f"  手動清單 FAIL: {e}")
          time.sleep(1)

          # ── 4. 加密貨幣（CoinGecko Top 100）────────────────────────
          print("\n[4] 加密貨幣...")
          try:
              url = 'https://api.coingecko.com/api/v3/coins/markets?vs_currency=twd&order=market_cap_desc&per_page=100&page=1'
              content = fetch(url, timeout=25)
              coins = json.loads(content)
              count = 0
              for coin in coins:
                  cid   = coin.get('id', '')
                  price = coin.get('current_price')
                  sym   = coin.get('symbol', '')
                  if cid and price and price > 0:
                      result[cid.lower()] = {'price': price, 'ccy': 'TWD', 'src': 'coingecko', 'sym': sym}
                      count += 1
              print(f"  OK: {count} 筆")
          except Exception as e:
              print(f"  FAIL: {e}")

          # ── 5. 寫入 prices.json ──────────────────────────────────
          now_utc = datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
          output = {'updated': now_utc, 'count': len(result), 'prices': result}
          with open('prices.json', 'w', encoding='utf-8') as f:
              json.dump(output, f, ensure_ascii=False)
          print(f"\nDONE: prices.json 共 {len(result)} 筆，{now_utc}")
          EOF

      - name: Commit prices.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --staged --quiet || git commit -m "chore: update prices $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
