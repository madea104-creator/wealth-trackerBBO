name: Update Stock Prices

on:
  schedule:
    - cron: '30 6 * * 1-5'    # 台灣時間 14:30（週一到週五，收盤後）
    - cron: '0 1 * * 1-5'     # 台灣時間 09:00（開盤前，確保有昨收價）
  workflow_dispatch:            # 允許手動觸發

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch all market prices
        run: |
          python3 << 'EOF'
          import urllib.request
          import json
          import csv
          import time
          import datetime
          import io

          result = {}

          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0',
              'Accept': 'text/html,application/json,*/*',
              'Accept-Language': 'zh-TW,zh;q=0.9',
          }

          def fetch(url, timeout=20):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=timeout) as r:
                  return r.read().decode('utf-8-sig', errors='ignore')

          # 1. 台灣上市股票（含ETF）
          print("抓取上市股票（TWSE）...")
          try:
              url = 'https://www.twse.com.tw/exchangeReport/STOCK_DAY_ALL?response=open_data'
              content = fetch(url)
              reader = csv.reader(io.StringIO(content))
              count = 0
              for i, row in enumerate(reader):
                  if i == 0:
                      continue
                  if len(row) < 9:
                      continue
                  ticker = row[0].strip()
                  close  = row[8].strip().replace(',', '')
                  if not ticker or not close or close in ('--', '-', ''):
                      continue
                  try:
                      price = float(close)
                      if price > 0:
                          result[ticker] = {'price': price, 'ccy': 'TWD', 'src': 'twse'}
                          count += 1
                  except:
                      pass
              print(f"  OK: {count} 筆")
          except Exception as e:
              print(f"  FAIL: {e}")

          time.sleep(2)

          # 2. 台灣上櫃股票（含ETF）
          print("抓取上櫃股票（TPEx）...")
          try:
              url = 'https://www.tpex.org.tw/web/stock/aftertrading/DAILY_CLOSE_quotes/stk_quote_result.php?l=zh-tw&o=data'
              content = fetch(url)
              reader = csv.reader(io.StringIO(content))
              count = 0
              for i, row in enumerate(reader):
                  if i < 3:
                      continue
                  if len(row) < 3:
                      continue
                  ticker = row[0].strip()
                  close  = row[2].strip().replace(',', '')
                  if not ticker or not close or close in ('--', '-', ''):
                      continue
                  try:
                      price = float(close)
                      if price > 0 and ticker not in result:
                          result[ticker] = {'price': price, 'ccy': 'TWD', 'src': 'tpex'}
                          count += 1
                  except:
                      pass
              print(f"  OK: {count} 筆")
          except Exception as e:
              print(f"  FAIL: {e}")

          time.sleep(2)

          # 3. 可轉換公司債（CB）
          print("抓取可轉換公司債（CB）...")
          cb_count = 0

          # 上市CB（TWSE債券行情）
          for cb_url in [
              'https://www.twse.com.tw/rwd/zh/bond/BWCV?response=json',
              'https://www.twse.com.tw/exchangeReport/BWCV?response=json'
          ]:
              try:
                  content = fetch(cb_url)
                  data = json.loads(content)
                  for row in data.get('data', []):
                      if len(row) < 5:
                          continue
                      ticker = str(row[0]).strip()
                      close  = str(row[4]).strip().replace(',', '')
                      if not close or close in ('-', '--', ''):
                          continue
                      try:
                          price = float(close)
                          if price > 0:
                              result[ticker] = {'price': price, 'ccy': 'TWD', 'src': 'twse_cb'}
                              cb_count += 1
                      except:
                          pass
                  if cb_count > 0:
                      break
              except Exception as e:
                  print(f"  上市CB {cb_url} FAIL: {e}")

          time.sleep(1)

          # 上櫃CB（TPEx債券行情）
          try:
              url = 'https://www.tpex.org.tw/web/bond/search/daily/bd_daily_result.php?l=zh-tw&o=data&t=C'
              content = fetch(url)
              reader = csv.reader(io.StringIO(content))
              for i, row in enumerate(reader):
                  if i < 2:
                      continue
                  if len(row) < 3:
                      continue
                  ticker = row[0].strip()
                  close  = row[2].strip().replace(',', '')
                  if not close or close in ('-', '--', ''):
                      continue
                  try:
                      price = float(close)
                      if price > 0 and ticker not in result:
                          result[ticker] = {'price': price, 'ccy': 'TWD', 'src': 'tpex_cb'}
                          cb_count += 1
                  except:
                      pass
          except Exception as e:
              print(f"  上櫃CB FAIL: {e}")

          print(f"  OK: {cb_count} 筆")
          time.sleep(1)

          # 4. 加密貨幣（CoinGecko Top 100）
          print("抓取加密貨幣...")
          try:
              url = 'https://api.coingecko.com/api/v3/coins/markets?vs_currency=twd&order=market_cap_desc&per_page=100&page=1'
              content = fetch(url, timeout=25)
              coins = json.loads(content)
              count = 0
              for coin in coins:
                  cid   = coin.get('id', '')
                  price = coin.get('current_price')
                  if cid and price and price > 0:
                      result[cid.lower()] = {'price': price, 'ccy': 'TWD', 'src': 'coingecko'}
                      count += 1
              print(f"  OK: {count} 筆")
          except Exception as e:
              print(f"  FAIL: {e}")

          # 5. 寫入 prices.json
          now_utc = datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
          output = {
              'updated': now_utc,
              'count':   len(result),
              'prices':  result
          }
          with open('prices.json', 'w', encoding='utf-8') as f:
              json.dump(output, f, ensure_ascii=False)

          print(f"\nDONE: prices.json 共 {len(result)} 筆，{now_utc}")
          EOF

      - name: Commit prices.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --staged --quiet || git commit -m "chore: update prices $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
